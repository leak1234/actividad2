{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg p-4">
            <h2 class="text-center mb-4 text-primary">Agendar Cita Veterinaria</h2>
            <form action="/submit" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre del Dueño</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre de la Mascota</label>
                        <input type="text" name="mascota" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Servicio</label>
                        <select name="servicio" class="form-select" required>
                            <option value="Consulta General">Consulta General</option>
                            <option value="Vacunación">Vacunación</option>
                            <option value="Peluquería">Peluquería</option>
                            <option value="Cirugía">Cirugía</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea name="mensaje" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Guardar y Ver Tabla</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
